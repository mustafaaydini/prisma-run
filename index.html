'use strict';
// ============================================================ PRISMA RUN
// Endless runner x color matching, across a 5-world universe.
// Single file, zero dependencies. All art & audio procedural.
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---------- constants ----------

  { name: 'ROSE',  main: '#ff5e8a', glow: '#ffb2c9', dark: '#8a2647' },
  { name: 'CYAN',  main: '#3ee6d8', glow: '#aef4ee', dark: '#186e67' },
  { name: 'AMBER', main: '#ffb347', glow: '#ffdda3', dark: '#8a5a1a' },

const HORIZON = 0.36, PLAYER_Y = 0.86, LANE_SPREAD = 0.24, PLAYER_Z = 0.03, PERSP = 2.3;
const WORLD_LEN = 13;   // travel units per world (~780 m)

  { name: 'COSMIC VOID',     skyTop:'#010208', skyMid:'#1a1038', skyBot:'#05030f', road:'#140d2e', road2:'#1e1442', mount:'#0d0722', mount2:'#080417', sun:['#ffffff','#b0b8ff','#4a3ae0'], line:[160,170,255], ring:true },
  { name: 'SOLAR DAWN',      skyTop:'#2a1a4d', skyMid:'#c9564a', skyBot:'#3a1f3d', road:'#4a2440', road2:'#5e2f4a', mount:'#331a3d', mount2:'#26142e', sun:['#fff3b0','#ffb347','#e05a3a'], line:[255,200,140] },

const SKINS = [

// colorblind-friendly glyph per prism color (shown on gates & HUD dots alongside hue)
const COLOR_ICONS = ['◆', '●', '▲'];
const UPGRADES = [

  { id:'magnet', name:'Magnet Boost',    desc:'+3s magnet duration per level', max:3, price:[150,350,700] },

];
// ---- MONETIZATION: shard packs sold for real money.
// Put your payment links here (Stripe payment links, itch.io, Gumroad, ...).
// Empty string = button shows "not configured" toast instead of opening a page.
const PAYMENT_LINKS = { small:'', medium:'', large:'' };
const GEM_PACKS = [
  { id:'small',  gems:1500,  label:'$1.99' },
  { id:'medium', gems:5000,  label:'$4.99' },
  { id:'large',  gems:14000, label:'$9.99' },
];

// To earn real money, publish on a portal and replace show() with its SDK:

const Ads = {

    adCtx = { t: 3, onReward, ret: returnState };

// ---------- save data ----------
const SAVE_KEY = 'prismaRunSave2';
let save;
function defaultSave() {
  return {
    best: 0, bestCombo: 0, gems: 0, muted: false,
    skins: ['prism'], activeSkin: 'prism',
    up: { shield: 0, magnet: 0, star: 0, combo: 0 },
    stats: { runs: 0, gates: 0, crystals: 0, powers: 0, dist: 0 },
    missions: [], mtier: {}, lastDaily: '',
  };
}
function loadSave() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (s && s.up) return Object.assign(defaultSave(), s);
  } catch (e) {}
  const s = defaultSave();
  s.best = +(localStorage.getItem('prismaRunBest') || 0); // migrate v1
  return s;
}
function persist() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
save = loadSave();

// ---------- missions ----------
const MPOOL = {
  runGates:    { tiers:[8, 15, 25, 40],      rw:[60, 120, 250, 500],  txt: n => 'Pass ' + n + ' gates in one run' },
  runCombo:    { tiers:[3, 5, 8, 12],        rw:[60, 140, 300, 600],  txt: n => 'Reach a x' + n + ' combo' },
  totCrystals: { tiers:[30, 100, 300, 800],  rw:[80, 160, 320, 640],  txt: n => 'Collect ' + n + ' crystals in total' },
  runDist:     { tiers:[500, 1200, 2500, 5000], rw:[70, 150, 300, 600], txt: n => 'Travel ' + n + 'm in one run' },
  totPowers:   { tiers:[3, 10, 25, 60],      rw:[80, 160, 320, 640],  txt: n => 'Grab ' + n + ' power-ups in total' },
  runWorld:    { tiers:[2, 3, 5, 8],         rw:[100, 200, 400, 800], txt: n => 'Reach world ' + n + ' in one run' },
};
function newMission(excludeKeys) {
  const keys = Object.keys(MPOOL).filter(k => !excludeKeys.includes(k) && (save.mtier[k] || 0) < MPOOL[k].tiers.length);
  if (!keys.length) return null;
  const key = keys[(Math.random() * keys.length) | 0];
  return buildMission(key, save.mtier[key] || 0);
}
function buildMission(key, tier) {
  const p = MPOOL[key];
  return { key, tier, prog: 0, target: p.tiers[tier], reward: p.rw[tier], text: p.txt(p.tiers[tier]) };
}
function ensureMissions() {
  while (save.missions.length < 3) {
    const m = newMission(save.missions.map(x => x.key));
    if (!m) break;
    save.missions.push(m);
  }
}
ensureMissions();
function bumpMission(key, val, isTotal) {
  for (let i = 0; i < save.missions.length; i++) {
    const m = save.missions[i];
    if (m.key !== key) continue;
    m.prog = isTotal ? m.prog + val : Math.max(m.prog, val);
    if (m.prog >= m.target) {
      save.gems += m.reward;
      toast('MISSION COMPLETE  +' + m.reward + ' ◆', '#ffb347');
      sfxMission();
      save.mtier[m.key] = m.tier + 1;
      const next = (m.tier + 1 < MPOOL[m.key].tiers.length)
        ? buildMission(m.key, m.tier + 1)
        : newMission(save.missions.map(x => x.key));
      if (next) save.missions[i] = next; else save.missions.splice(i, 1);
      ensureMissions();
    }
  }
  persist();
}

// ---------- state ----------
let state = 'menu'; // menu|playing|dying|revive|ad|gameover|paused|shop|missions
let prevState = 'menu';
let shopTab = 0;
let adCtx = null;
let reviveTimer = 0;
let toasts = [];
let uiBtns = [];
const game = {};

function resetGame() {
  game.score = 0; game.dist = 0; game.speed = 0.42;
  game.travel = 0; game.spawnAcc = 0; game.gap = 0.42;
  game.lane = 1; game.laneF = 1;
  game.color = 0; game.colorPulse = 0;
  game.combo = 0; game.maxCombo = 0; game.lastGateColor = -1;
  game.entities = []; game.particles = []; game.popups = [];
  game.shake = 0; game.timeScale = 1; game.dieTimer = 0;
  game.gatesPassed = 0; game.runShards = 0; game.runCrystals = 0;
  game.world = 0; game.bannerT = 0; game.bannerText = '';
  game.shield = save.up.shield > 0;
  game.magnetT = 0; game.starT = 0; game.invulnT = 0;
  game.comboGuards = save.up.combo;
  game.reviveUsed = false; game.doubled = false;
  game.rowCount = 0; game.powerCooldown = 12 + Math.random() * 8;
  game.lastSpawnGateColor = -1;
  game.scoreDisplay = 0; game.runPhase = 0;
  game.flashT = 0; game.flashColor = '255,255,255';
  game.countdownT = 0;
  game.props = game.props || []; game.propAcc = 0; game.archAcc = 2; // scenery survives menu→run
}
resetGame();

// ---------- palette (lerped between worlds) ----------
function hex2rgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}
function rgbStr(a) { return 'rgb(' + (a[0] | 0) + ',' + (a[1] | 0) + ',' + (a[2] | 0) + ')'; }
function worldPal(w) {
  return {
    skyTop: hex2rgb(w.skyTop), skyMid: hex2rgb(w.skyMid), skyBot: hex2rgb(w.skyBot),
    road: hex2rgb(w.road), road2: hex2rgb(w.road2), mount: hex2rgb(w.mount), mount2: hex2rgb(w.mount2),
    sun0: hex2rgb(w.sun[0]), sun1: hex2rgb(w.sun[1]), sun2: hex2rgb(w.sun[2]),
    line: w.line.slice(), city: w.city ? 1 : 0, ring: w.ring ? 1 : 0,
  };
}
let pal = worldPal(WORLDS[0]);
function lerpPal(target, k) {
  for (const key in target) {
    if (Array.isArray(pal[key])) {
      for (let i = 0; i < pal[key].length; i++) pal[key][i] += (target[key][i] - pal[key][i]) * k;
    } else pal[key] += (target[key] - pal[key]) * k;
  }
}

// ---------- audio: 4-track lookahead sequencer (kick/hat/bass/arp) + delay send ----------
let actx = null, master = null, delaySend = null;
let musicNext = 0, musicStep16 = 0;
const SCALE = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3];
const ARP_PAT = [0, 2, 4, 7, 5, 4, 2, 3];
const BASS_PAT = [0, 0, 3, 5]; // scale degrees per bar
function initAudio() {
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  actx = new AC();
  master = actx.createGain();
  master.gain.value = save.muted ? 0 : 0.45;
  master.connect(actx.destination);
  // echo bus: everything routed here repeats softly — instant "produced" feel
  delaySend = actx.createDelay(0.6);
  delaySend.delayTime.value = 0.27;
  const fb = actx.createGain(); fb.gain.value = 0.3;
  const wet = actx.createGain(); wet.gain.value = 0.3;
  delaySend.connect(fb); fb.connect(delaySend);
  delaySend.connect(wet); wet.connect(master);
}
function tone(freq, dur, type, vol, slideTo, when, echo) {
  if (!actx || save.muted) return;
  const t = when || actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(master);
  if (echo && delaySend) g.connect(delaySend);
  o.start(t); o.stop(t + dur + 0.05);
}
function noise(dur, vol, when, hpFreq) {
  if (!actx || save.muted) return;
  const t = when || actx.currentTime, len = Math.max(1, actx.sampleRate * dur);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  let node = src;
  if (hpFreq) {
    const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = hpFreq;
    src.connect(hp); node = hp;
  }
  node.connect(g); g.connect(master); src.start(t);
}
function kick(when) {
  if (!actx || save.muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(130, when);
  o.frequency.exponentialRampToValueAtTime(44, when + 0.1);
  g.gain.setValueAtTime(0.32, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.13);
  o.connect(g); g.connect(master);
  o.start(when); o.stop(when + 0.16);
}
function bass(freq, when) {
  if (!actx || save.muted) return;
  const o = actx.createOscillator(), g = actx.createGain(), lp = actx.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(freq, when);
  lp.type = 'lowpass'; lp.frequency.setValueAtTime(520, when);
  g.gain.setValueAtTime(0.13, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.4);
  o.connect(lp); lp.connect(g); g.connect(master);
  o.start(when); o.stop(when + 0.45);
}
function sfxGate(c)   { tone(SCALE[Math.min(c, 7)] * 2, 0.18, 'triangle', 0.25, 0, 0, true); tone(SCALE[Math.min(c, 7)], 0.25, 'sine', 0.15); noise(0.06, 0.1, 0, 5000); }
function sfxCrystal(m){ tone(m ? 1318 : 1046, 0.12, 'sine', 0.18, m ? 1760 : 1318, 0, true); }
function sfxSwitch()  { tone(520, 0.07, 'square', 0.06, 700); }
function sfxLane()    { noise(0.09, 0.12, 0, 1200); tone(300, 0.06, 'sine', 0.05, 360); }
function sfxNear()    { noise(0.12, 0.16, 0, 800); }
function sfxDeath()   { noise(0.4, 0.5); tone(220, 0.6, 'sawtooth', 0.2, 55); }
function sfxPower()   { tone(660, 0.1, 'triangle', 0.2, 990, 0, true); tone(990, 0.2, 'sine', 0.12, 1320, 0, true); }
function sfxShield()  { tone(180, 0.3, 'sawtooth', 0.18, 90); tone(440, 0.15, 'square', 0.08); }
function sfxBuy()     { tone(523, 0.1, 'sine', 0.2, 784, 0, true); tone(1046, 0.2, 'sine', 0.12, 0, 0, true); }
function sfxDenied()  { tone(180, 0.15, 'square', 0.1, 120); }
function sfxMission() { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'sine', 0.15, 0, 0, true), i * 90)); }
function sfxWorld()   { tone(196, 0.8, 'sine', 0.15, 392, 0, true); tone(392, 0.8, 'triangle', 0.1, 784, 0, true); }
function musicTick(dt) {
  if (!actx || save.muted) return;
  const driving = state === 'playing' || state === 'countdown' || state === 'dying';
  const ambient = state === 'menu' || state === 'shop' || state === 'missions';
  if (!driving && !ambient) return;
  const now = actx.currentTime;
  if (musicNext < now - 0.25) musicNext = now + 0.05; // resync after pause/tab-switch
  const STEP = 0.135; // 16ths @ ~111 BPM
  while (musicNext < now + 0.18) {
    const s = musicStep16 % 16;
    const bar = (musicStep16 >> 4) % 4;
    const tr = driving ? 1 + (game.world % WORLDS.length) * 0.059 : 1;
    if (driving) {
      if (s === 0 || s === 8) kick(musicNext);
      if (s === 4 || s === 12) noise(0.035, 0.07, musicNext, 6000);
      if (s === 14) noise(0.03, 0.045, musicNext, 7000);
      if (s === 0) bass(SCALE[BASS_PAT[bar]] / 2 * tr, musicNext);
    } else if (s === 0) {
      bass(SCALE[BASS_PAT[bar]] / 2, musicNext);
    }
    if (s % 2 === 0) {
      const deg = ARP_PAT[(musicStep16 >> 1) % 8];
      tone(SCALE[deg % 8] * (deg >= 8 ? 2 : 1) * tr, 0.22, driving ? 'triangle' : 'sine', driving ? 0.05 : 0.035, 0, musicNext, true);
    }
    musicStep16++;
    musicNext += STEP;
  }
}
function toggleMute() {
  save.muted = !save.muted; persist();
  if (master) master.gain.value = save.muted ? 0 : 0.45;
}

// ---------- helpers ----------
function persp(z) {
  const t = Math.pow(Math.max(0, 1 - z), PERSP);
  const hy = H * HORIZON, py = H * PLAYER_Y;
  return { y: hy + (py - hy) * t, s: 0.04 + 0.96 * t };
}
function curveOffset(z, s) {
  // purely cosmetic road wander: applied uniformly to road + entities + player
  // at a given (z, s), so it never touches lane/collision logic (that's pure
  // integer lane math elsewhere).
  const worldZ = game.travel + z;
  return Math.sin(worldZ * 0.14) * W * 0.055 * s;
}
function laneX(lane, s, z) {
  const base = W / 2 + (lane - 1) * W * LANE_SPREAD * s;
  return z === undefined ? base : base + curveOffset(z, s);
}
function vibrate(pattern) {
  if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
}
function burst(x, y, color, n, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = (0.3 + Math.random()) * spd;
    game.particles.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - spd * 0.4,
      life: 0.5 + Math.random() * 0.5, maxLife: 1, color, size: 2 + Math.random() * 4 });
  }
}
function groundShadow(x, y, w, alpha) {
  ctx.save();
  ctx.fillStyle = 'rgba(5,2,15,' + alpha + ')';
  ctx.beginPath();
  ctx.ellipse(x, y, Math.max(0.5, w), Math.max(0.5, w * 0.26), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}
function popup(txt, color, big) { game.popups.push({ text: txt, color, x: W / 2, y: H * 0.42, life: 1.1, big: !!big }); }
function toast(txt, color) { toasts.push({ text: txt, color: color || '#fff', life: 3 }); }
function fmt(n) { return Math.floor(n).toLocaleString('en-US'); }

// ---------- input ----------
function startPlay() { resetGame(); state = 'countdown'; game.countdownT = 0.55; }
function switchColor() { game.color = (game.color + 1) % 3; game.colorPulse = 1; sfxSwitch(); }
function moveLane(dir) {
  const n = Math.min(2, Math.max(0, game.lane + dir));
  if (n !== game.lane) { game.lane = n; sfxLane(); }
}
function primaryAction() {
  initAudio();
  if (state === 'menu') startPlay();
  else if (state === 'gameover' && game.dieTimer <= 0) startPlay();
  else if (state === 'playing') switchColor();
  else if (state === 'paused') state = 'playing';
}
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  initAudio();
  const k = e.key;
  if (k === ' ' || k === 'ArrowUp' || k === 'w' || k === 'W') { e.preventDefault(); primaryAction(); }
  else if (k === 'ArrowLeft' || k === 'a' || k === 'A')  { if (state === 'playing') moveLane(-1); }
  else if (k === 'ArrowRight' || k === 'd' || k === 'D') { if (state === 'playing') moveLane(1); }
  else if (k === '1' || k === '2' || k === '3') { if (state === 'playing') { game.color = +k - 1; game.colorPulse = 1; sfxSwitch(); } }
  else if (k === 'p' || k === 'P') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
  else if (k === 'Escape') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
    else if (state === 'shop' || state === 'missions') state = 'menu';
  }
  else if (k === 'm' || k === 'M') toggleMute();
  else if (state === 'menu' || state === 'gameover') primaryAction();
});
let touchX = null, touchMoved = false, downPt = null;
window.addEventListener('pointerdown', e => {
  touchX = e.clientX; touchMoved = false; downPt = { x: e.clientX, y: e.clientY };
});
window.addEventListener('pointermove', e => {
  if (touchX === null || state !== 'playing') return;
  const dx = e.clientX - touchX;
  if (Math.abs(dx) > 42) { moveLane(dx > 0 ? 1 : -1); touchX = e.clientX; touchMoved = true; }
});
window.addEventListener('pointerup', e => {
  if (touchX !== null && !touchMoved) {
    const x = e.clientX, y = e.clientY;
    for (const b of uiBtns) {
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
        initAudio(); b.cb(); touchX = null; return;
      }
    }
    if (state !== 'shop' && state !== 'missions' && state !== 'revive' && state !== 'ad') primaryAction();
  }
  touchX = null;
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'playing') state = 'paused';
});

// ---------- spawning ----------
function spawnRow() {
  game.rowCount++;
  const wIdx = game.world % WORLDS.length;
  const loop = (game.world / WORLDS.length) | 0;
  // occasional power-up row
  game.powerCooldown--;
  if (game.powerCooldown <= 0) {
    game.powerCooldown = 16 + Math.random() * 10;
    const kinds = ['shield', 'magnet', 'star'];
    game.entities.push({ type: 'power', lane: (Math.random() * 3) | 0, z: 1, kind: kinds[(Math.random() * 3) | 0] });
    return;
  }
  const r = Math.random();
  const doubleGateChance = wIdx >= 2 || loop > 0 ? 0.12 : 0;
  if (r < doubleGateChance) { // two gates, pick either
    const l1 = (Math.random() * 3) | 0;
    let l2 = (l1 + 1 + ((Math.random() * 2) | 0)) % 3;
    const c1 = (Math.random() * 3) | 0;
    const c2 = (c1 + 1 + ((Math.random() * 2) | 0)) % 3;
    game.entities.push({ type: 'gate', lane: l1, z: 1, color: c1 });
    game.entities.push({ type: 'gate', lane: l2, z: 1, color: c2 });
  } else if (r < 0.46) { // gate row
    const lane = (Math.random() * 3) | 0;
    let col;
    if (game.lastSpawnGateColor >= 0 && Math.random() < 0.55) col = game.lastSpawnGateColor;
    else col = (Math.random() * 3) | 0;
    game.lastSpawnGateColor = col;
    game.entities.push({ type: 'gate', lane, z: 1, color: col });
    for (let l = 0; l < 3; l++) {
      if (l !== lane && Math.random() < 0.4) game.entities.push({ type: 'obstacle', lane: l, z: 1 });
    }
  } else if (r < 0.78) { // obstacle row (never all 3 lanes)
    const movingChance = wIdx >= 1 || loop > 0 ? 0.3 : 0;
    if (Math.random() < movingChance) {
      // single sweeper oscillating between two adjacent lanes; third lane always safe
      const base = (Math.random() * 2) | 0; // 0..1, sweeps base..base+1
      game.entities.push({ type: 'obstacle', lane: base, z: 1, moving: true, phase: Math.random() * 6.28 });
    } else {
      const open = (Math.random() * 3) | 0;
      const both = Math.random() < 0.45;
      for (let l = 0; l < 3; l++) {
        if (l === open) continue;
        if (both || Math.random() < 0.6) game.entities.push({ type: 'obstacle', lane: l, z: 1 });
      }
    }
  } else { // crystal trail
    const lane = (Math.random() * 3) | 0;
    const col = (Math.random() * 3) | 0;
    const n = 3 + ((Math.random() * 3) | 0);
    for (let i = 0; i < n; i++) game.entities.push({ type: 'crystal', lane, z: 1 + i * 0.09, color: col });
  }
}

// ---------- roadside scenery (decorative only — never touches collision) ----------
function updateProps(dz, t) {
  game.propAcc += dz;
  game.archAcc += dz;
  while (game.propAcc >= 0.16) {
    game.propAcc -= 0.16;
    const kinds = ['crystal', 'crystal', 'pillar', 'rock'];
    game.props.push({
      type: 'prop',
      kind: kinds[(Math.random() * kinds.length) | 0],
      side: Math.random() < 0.5 ? -1 : 1,
      off: 1.6 + Math.random() * 2.4,
      z: 1, seed: Math.random() * 10,
      h: 0.5 + Math.random() * 0.9,
    });
  }
  if (game.archAcc >= 3.6) {
    game.archAcc = 0;
    game.props.push({ type: 'prop', kind: 'arch', z: 1, seed: Math.random() * 10 });
  }
  for (let i = game.props.length - 1; i >= 0; i--) {
    game.props[i].z -= dz;
    if (game.props[i].z < -0.02) game.props.splice(i, 1);
  }
}
function drawProp(e, t) {
  const p = persp(e.z);
  const lc = pal.line.map(v => v | 0).join(',');
  if (e.kind === 'arch') {
    // gateway spanning the whole road — the "passing under something" moment
    const lx = laneX(-1.15, p.s, e.z), rx = laneX(3.15, p.s, e.z);
    const topY = p.y - Math.min(W, H) * 0.52 * p.s;
    const lw = Math.max(1.5, 10 * p.s);
    ctx.save();
    ctx.strokeStyle = 'rgba(' + lc + ',0.55)';
    ctx.lineWidth = lw;
    if (p.s > 0.15) { ctx.shadowColor = rgbStr(pal.sun1); ctx.shadowBlur = 16 * p.s; }
    ctx.beginPath();
    ctx.moveTo(lx, p.y);
    ctx.lineTo(lx, topY + (rx - lx) * 0.1);
    ctx.quadraticCurveTo((lx + rx) / 2, topY - (rx - lx) * 0.08, rx, topY + (rx - lx) * 0.1);
    ctx.lineTo(rx, p.y);
    ctx.stroke();
    // hanging beacon at apex
    ctx.fillStyle = rgbStr(pal.sun0);
    ctx.beginPath();
    ctx.arc((lx + rx) / 2, topY - (rx - lx) * 0.02, Math.max(1.5, 5 * p.s), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }
  const lane = e.side > 0 ? 1 + 1 + e.off : 1 - 1 - e.off;
  const x = laneX(lane, p.s, e.z);
  const base = Math.min(W, H) * 0.22 * p.s * e.h;
  ctx.save();
  if (e.kind === 'pillar') {
    // slim monolith with a lit tip
    const w = base * 0.14;
    ctx.fillStyle = rgbStr(pal.mount);
    ctx.fillRect(x - w / 2, p.y - base * 1.6, w, base * 1.6);
    ctx.fillStyle = 'rgba(' + lc + ',0.85)';
    if (p.s > 0.15) { ctx.shadowColor = 'rgb(' + lc + ')'; ctx.shadowBlur = 12 * p.s; }
    ctx.fillRect(x - w / 2, p.y - base * 1.6, w, base * 0.16);
  } else if (e.kind === 'rock') {
    const bob = Math.sin(t * 1.2 + e.seed * 7) * base * 0.1;
    const y = p.y - base * 0.9 + bob;
    ctx.fillStyle = rgbStr(pal.mount);
    ctx.strokeStyle = 'rgba(' + lc + ',0.25)';
    ctx.lineWidth = Math.max(1, 2 * p.s);
    ctx.beginPath();
    ctx.moveTo(x, y - base * 0.5);
    ctx.lineTo(x + base * 0.45, y - base * 0.1);
    ctx.lineTo(x + base * 0.3, y + base * 0.4);
    ctx.lineTo(x - base * 0.35, y + base * 0.35);
    ctx.lineTo(x - base * 0.5, y - base * 0.15);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else { // crystal cluster
    ctx.strokeStyle = 'rgba(' + lc + ',0.3)';
    ctx.lineWidth = Math.max(1, 2 * p.s);
    for (let i = 0; i < 3; i++) {
      const hx = x + (i - 1) * base * 0.3;
      const hh = base * (1.3 - Math.abs(i - 1) * 0.45) * (0.8 + ((e.seed * (i + 3)) % 1) * 0.4);
      ctx.fillStyle = i === 1 ? rgbStr(pal.mount) : rgbStr(pal.mount2);
      ctx.beginPath();
      ctx.moveTo(hx, p.y - hh);
      ctx.lineTo(hx + base * 0.18, p.y);
      ctx.lineTo(hx - base * 0.18, p.y);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      if (i === 1 && p.s > 0.18) { // lit tip on the tall one
        ctx.fillStyle = 'rgba(' + lc + ',0.9)';
        ctx.beginPath();
        ctx.arc(hx, p.y - hh, Math.max(1, 3 * p.s), 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

// ---------- run lifecycle ----------
function die(reason) {
  if (game.invulnT > 0 || game.starT > 0) return;
  if (game.shield) {
    game.shield = false;
    game.invulnT = 1.4;
    sfxShield();
    vibrate(15);
    game.flashT = 0.6; game.flashColor = '142,203,255';
    const p = persp(PLAYER_Z);
    burst(laneX(game.laneF, 1, PLAYER_Z), p.y - 20, '#8ecbff', 26, 300);
    popup('SHIELD LOST!', '#8ecbff', true);
    game.shake = 12;
    // clear the row that hit us so we don't instantly re-collide
    for (const e of game.entities) if (e.z < 0.12 && e.z > -0.05) e.hit = true;
    return;
  }
  state = 'dying';
  game.dieTimer = 1.0;
  game.deathReason = reason;
  game.shake = 18;
  sfxDeath();
  vibrate([25, 40, 25]);
  const fc = hex2rgb(COLORS[game.color].main);
  game.flashT = 1; game.flashColor = fc.join(',');
  const p = persp(PLAYER_Z);
  burst(laneX(game.laneF, 1, PLAYER_Z), p.y - 20, COLORS[game.color].main, 40, 380);
  burst(laneX(game.laneF, 1, PLAYER_Z), p.y - 20, '#ffffff', 20, 300);
}
function finalizeDeath() {
  save.gems += game.runShards;
  save.stats.runs++;
  save.stats.dist += Math.floor(game.dist);
  if (game.score > save.best) save.best = Math.floor(game.score);
  if (game.maxCombo > save.bestCombo) save.bestCombo = game.maxCombo;
  persist();
  state = 'gameover';
  game.dieTimer = 0.5;
}
function abandonRun() {
  // quitting mid-run still banks the shards — losing them would just feel unfair
  save.gems += game.runShards;
  save.stats.runs++;
  save.stats.dist += Math.floor(game.dist);
  if (game.score > save.best) save.best = Math.floor(game.score);
  persist();
  resetGame();
  state = 'menu';
}
function revivePlayer() {
  game.reviveUsed = true;
  game.entities = game.entities.filter(e => e.z > 0.5);
  game.invulnT = 2;
  game.timeScale = 1;
  state = 'playing';
  sfxMission();
  popup('REVIVED!', '#8ecbff', true);
}

// ---------- update ----------
function update(dt, t) {
  musicTick(dt);
  // always-on cosmetics
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 300 * dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.popups.length - 1; i >= 0; i--) {
    const p = game.popups[i];
    p.life -= dt; p.y -= 50 * dt;
    if (p.life <= 0) game.popups.splice(i, 1);
  }
  for (let i = toasts.length - 1; i >= 0; i--) {
    toasts[i].life -= dt;
    if (toasts[i].life <= 0) toasts.splice(i, 1);
  }
  game.shake = Math.max(0, game.shake - dt * 30);
  game.colorPulse = Math.max(0, game.colorPulse - dt * 4);
  game.flashT = Math.max(0, game.flashT - dt * 3.2);
  game.scoreDisplay += (game.score - game.scoreDisplay) * Math.min(1, dt * 10);
  if (state !== 'playing' && state !== 'dying' && state !== 'paused') {
    game.runPhase += dt * (state === 'countdown' ? 1.15 : 1.4);
  }
  if (game.bannerT > 0) game.bannerT -= dt;

  // palette drift
  let targetWorld;
  if (state === 'playing' || state === 'dying' || state === 'revive' || state === 'gameover') {
    targetWorld = WORLDS[game.world % WORLDS.length];
  } else {
    targetWorld = WORLDS[((t / 9) | 0) % WORLDS.length]; // menu slowly tours the universe
  }
  lerpPal(worldPal(targetWorld), Math.min(1, dt * 1.6));

  // attract mode: the world keeps drifting behind menu screens
  if (state === 'menu' || state === 'shop' || state === 'missions') {
    const adz = dt * 0.1;
    game.travel += adz;
    updateProps(adz, t);
  }

  if (state === 'revive') {
    reviveTimer -= dt;
    if (reviveTimer <= 0) finalizeDeath();
    return;
  }
  if (state === 'ad') {
    adCtx.t -= dt;
    if (adCtx.t <= 0) {
      const cb = adCtx.onReward, ret = adCtx.ret;
      adCtx = null; state = ret;
      cb();
    }
    return;
  }
  if (state === 'countdown') {
    game.countdownT -= dt;
    if (game.countdownT <= 0) state = 'playing';
    return;
  }
  if (state === 'gameover' && game.dieTimer > 0) game.dieTimer -= dt;
  if (state !== 'playing' && state !== 'dying') return;

  if (state === 'dying') {
    game.dieTimer -= dt;
    game.timeScale = Math.max(0.06, game.timeScale - dt * 2.5);
    if (game.dieTimer <= 0) {
      if (!game.reviveUsed && Ads.available && game.score > 150) {
        state = 'revive'; reviveTimer = 5;
      } else finalizeDeath();
    }
  }

  const d = dt * game.timeScale;
  if (state === 'playing') {
    const loop = (game.world / WORLDS.length) | 0;
    game.speed = Math.min(1.35 + loop * 0.1, 0.42 + game.travel * 0.011);
    game.gap = Math.max(0.24, 0.42 - game.travel * 0.003);
  }
  const dz = game.speed * d;
  game.runPhase += dz * 26;
  game.travel += dz;
  game.dist += dz * 60;
  if (state === 'playing') {
    game.score += dz * 120;
    bumpMission('runDist', Math.floor(game.dist), false);
  }

  // world progression
  const newWorld = (game.travel / WORLD_LEN) | 0;
  if (newWorld !== game.world && state === 'playing') {
    game.world = newWorld;
    const w = WORLDS[game.world % WORLDS.length];
    game.bannerT = 3;
    game.bannerText = 'WORLD ' + (game.world + 1) + ' — ' + w.name;
    sfxWorld();
    vibrate(20);
    game.score += 250;
    popup('+250 NEW WORLD', '#fff', true);
    bumpMission('runWorld', game.world + 1, false);
  }

  // timers
  game.magnetT = Math.max(0, game.magnetT - dt);
  game.starT = Math.max(0, game.starT - dt);
  game.invulnT = Math.max(0, game.invulnT - dt);

  // spawn
  game.spawnAcc += dz;
  if (game.spawnAcc >= game.gap && state === 'playing') {
    game.spawnAcc -= game.gap;
    spawnRow();
  }
  updateProps(dz, t);

  game.laneF += (game.lane - game.laneF) * Math.min(1, dt * 14);

  const px = laneX(game.laneF, 1, PLAYER_Z);
  for (let i = game.entities.length - 1; i >= 0; i--) {
    const e = game.entities[i];
    const prevZ = e.z;
    e.z -= dz;
    // moving obstacles sweep between lane and lane+1
    if (e.moving) e.curLane = e.lane + (Math.sin(t * 2.2 + e.phase) + 1) / 2;
    else e.curLane = e.lane;
    // magnet pull
    if (e.type === 'crystal' && game.magnetT > 0 && e.z < 0.55 && !e.hit) {
      e.lane += (game.laneF - e.lane) * Math.min(1, dt * 6);
    }
    if (state === 'playing' && prevZ > PLAYER_Z && e.z <= PLAYER_Z && !e.hit) {
      const onLane = Math.abs(game.laneF - e.curLane) < 0.5;
      if (e.type === 'gate' && onLane) {
        e.hit = true;
        const match = game.starT > 0 || e.color === game.color;
        if (match) {
          if (e.color === game.lastGateColor) game.combo++;
          else game.combo = 1;
          game.lastGateColor = e.color;
          game.maxCombo = Math.max(game.maxCombo, game.combo);
          game.gatesPassed++;
          save.stats.gates++;
          const pts = 50 * game.combo;
          game.score += pts;
          sfxGate(game.combo);
          vibrate(8);
          const p = persp(PLAYER_Z);
          burst(px, p.y - 20, COLORS[e.color].main, 24, 260);
          popup(game.combo > 1 ? 'COMBO x' + game.combo + '  +' + pts : '+' + pts, COLORS[e.color].main, game.combo > 2);
          game.shake = Math.min(10, 2 + game.combo);
          bumpMission('runGates', game.gatesPassed, false);
          bumpMission('runCombo', game.combo, false);
        } else {
          die('Wrong color!');
        }
      } else if (e.type === 'obstacle' && onLane) {
        if (game.starT > 0) {
          e.hit = true;
          game.score += 30;
          const p = persp(PLAYER_Z);
          burst(px, p.y - 20, '#c0b6ff', 16, 280);
          popup('+30 SMASH', '#c0b6ff');
          sfxCrystal(true);
        } else die('Hit an obstacle!');
      } else if (e.type === 'crystal' && onLane) {
        e.hit = true;
        const match = e.color === game.color || game.starT > 0;
        const pts = match ? 40 : 15;
        game.score += pts;
        game.runShards += match ? 3 : 1;
        game.runCrystals++;
        sfxCrystal(match);
        const p = persp(PLAYER_Z);
        burst(px, p.y - 30, COLORS[e.color].glow, match ? 14 : 7, 180);
        if (match) popup('+' + pts + ' RESONANCE', COLORS[e.color].glow);
        save.stats.crystals++;
        bumpMission('totCrystals', 1, true);
      } else if (e.type === 'power' && onLane) {
        e.hit = true;
        save.stats.powers++;
        sfxPower();
        vibrate(10);
        const p = persp(PLAYER_Z);
        burst(px, p.y - 30, '#ffffff', 20, 240);
        if (e.kind === 'shield') { game.shield = true; popup('SHIELD!', '#8ecbff', true); }
        else if (e.kind === 'magnet') { game.magnetT = 7 + save.up.magnet * 3; popup('MAGNET!', '#c0b6ff', true); }
        else { game.starT = 6 + save.up.star * 2; popup('STAR FRENZY!', '#ffe680', true); }
        bumpMission('totPowers', 1, true);
      } else if (e.type === 'obstacle' && !onLane && Math.abs(game.laneF - e.curLane) < 1.1) {
        // shaved past an obstacle in the adjacent lane
        game.score += 15;
        sfxNear();
        game.popups.push({ text: 'CLOSE +15', color: '#c0b6ff', x: px + (e.curLane > game.laneF ? 70 : -70), y: persp(PLAYER_Z).y - 60, life: 0.7 });
        game.shake = Math.max(game.shake, 3);
      } else if (e.type === 'gate' && !onLane) {
        // gate missed entirely: combo breaks (unless guarded, or the row had a twin gate)
        const twin = game.entities.some(o => o !== e && o.type === 'gate' && Math.abs(o.z - e.z) < 0.05);
        if (!twin && game.combo > 0) {
          if (game.comboGuards > 0) {
            game.comboGuards--;
            popup('COMBO GUARDED', '#8ecbff');
          } else { game.combo = 0; game.lastGateColor = -1; }
        }
      }
    }
    if (e.z < -0.1) game.entities.splice(i, 1);
  }

  // player trail
  if (state === 'playing' && Math.random() < 0.7) {
    const p = persp(PLAYER_Z);
    const trailColor = game.starT > 0 ? COLORS[(t * 8 | 0) % 3].main : COLORS[game.color].main;
    game.particles.push({
      x: px + (Math.random() - 0.5) * 14, y: p.y - 10 + Math.random() * 16,
      vx: (Math.random() - 0.5) * 30, vy: 60 + Math.random() * 60,
      life: 0.4, maxLife: 0.4, color: trailColor, size: 2 + Math.random() * 3,
    });
  }
}

// ---------- drawing: world ----------
function drawBackground(t) {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, rgbStr(pal.skyTop));
  sky.addColorStop(HORIZON, rgbStr(pal.skyMid));
  sky.addColorStop(HORIZON + 0.02, rgbStr(pal.skyBot));
  sky.addColorStop(1, rgbStr(pal.skyBot));
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // stars (more in cosmic worlds)
  const starCount = 60 + Math.round(pal.ring * 60);
  ctx.fillStyle = '#fff';
  for (let i = 0; i < starCount; i++) {
    const sx = ((i * 137.5) % 360) / 360 * W;
    const sy = ((i * 71.3) % 100) / 100 * H * HORIZON;
    ctx.globalAlpha = (0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + i))) * 0.7;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // slow nebula wisps
  for (let i = 0; i < 3; i++) {
    const nx = W * (0.2 + i * 0.3) + Math.sin(t * 0.05 + i * 2.4) * W * 0.06;
    const ny = H * HORIZON * (0.3 + (i % 2) * 0.35);
    const nr = Math.min(W, H) * (0.16 + i * 0.05);
    const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
    ng.addColorStop(0, 'rgba(' + pal.sun1.map(v => v | 0).join(',') + ',0.09)');
    ng.addColorStop(1, 'rgba(' + pal.sun1.map(v => v | 0).join(',') + ',0)');
    ctx.fillStyle = ng;
    ctx.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
  }
  // occasional shooting star
  const ssPhase = t % 9;
  if (ssPhase < 0.6) {
    const seed = ((t / 9) | 0) * 137.5;
    const sx = (seed % 70) / 100 * W + W * 0.1;
    const sy = ((seed * 1.7) % 40) / 100 * H * HORIZON;
    const prog = ssPhase / 0.6;
    ctx.save();
    ctx.globalAlpha = Math.sin(prog * Math.PI) * 0.8;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx + prog * 120, sy + prog * 40);
    ctx.lineTo(sx + prog * 120 - 46, sy + prog * 40 - 15);
    ctx.stroke();
    ctx.restore();
  }

  // sun
  const cx = W / 2, hy = H * HORIZON;
  const sunR = Math.min(W, H) * 0.13;
  const g = ctx.createRadialGradient(cx, hy, 0, cx, hy, sunR * 2.4);
  g.addColorStop(0, 'rgba(' + pal.sun0.map(v => v | 0).join(',') + ',0.85)');
  g.addColorStop(0.35, 'rgba(' + pal.sun1.map(v => v | 0).join(',') + ',0.35)');
  g.addColorStop(1, 'rgba(' + pal.sun2.map(v => v | 0).join(',') + ',0)');
  ctx.fillStyle = g;
  ctx.fillRect(cx - sunR * 2.5, hy - sunR * 2.5, sunR * 5, sunR * 5);
  ctx.beginPath();
  ctx.arc(cx, hy - sunR * 0.25, sunR, 0, Math.PI * 2);
  const g2 = ctx.createLinearGradient(cx, hy - sunR, cx, hy + sunR);
  g2.addColorStop(0, rgbStr(pal.sun0)); g2.addColorStop(0.5, rgbStr(pal.sun1)); g2.addColorStop(1, rgbStr(pal.sun2));
  ctx.fillStyle = g2;
  ctx.fill();
  // cosmic ring
  if (pal.ring > 0.05) {
    ctx.save();
    ctx.globalAlpha = pal.ring * 0.7;
    ctx.strokeStyle = rgbStr(pal.sun1);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(cx, hy - sunR * 0.25, sunR * 1.7, sunR * 0.4, -0.3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // skyline: mountains, or city buildings
  if (pal.city > 0.5) {
    ctx.fillStyle = rgbStr(pal.mount);

  ctx.lineTo(x + gw * 0.26, gy - gh);

function drawGate(e, t) {

  const c = COLORS[e.color];
  const gw = W * LANE_SPREAD * p.s * 0.96;

function drawTimerIcon(x, y, color, label, frac) {

function drawTitle(t) {
  const cx = W / 2, ty = H * 0.2;
  const size = Math.min(72, W / 7.2);
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // emblem: faceted gem hovering over the wordmark
  const er = size * 0.34;
  const ey = ty - size * 0.92 + Math.sin(t * 1.6) * 4;
  ctx.save();
  ctx.translate(cx, ey);
  ctx.rotate(Math.sin(t * 0.8) * 0.12);
  ctx.shadowColor = '#c9a0ff'; ctx.shadowBlur = 26;
  const facets = [[COLORS[0], -1], [COLORS[1], 1], [COLORS[2], 0]];
  for (const [c, sd] of facets) {
    ctx.fillStyle = c.main;
    ctx.beginPath();
    if (sd === 0) { ctx.moveTo(0, -er * 1.2); ctx.lineTo(er * 0.5, -er * 0.1); ctx.lineTo(-er * 0.5, -er * 0.1); }
    else { ctx.moveTo(sd * er * 0.5, -er * 0.1); ctx.lineTo(sd * er * 0.85, er * 0.15); ctx.lineTo(0, er * 1.1); ctx.lineTo(0, -er * 0.1); }
    ctx.closePath(); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = Math.max(1, er * 0.06);
  ctx.beginPath();
  ctx.moveTo(0, -er * 1.2); ctx.lineTo(er * 0.85, er * 0.15); ctx.lineTo(0, er * 1.1);
  ctx.lineTo(-er * 0.85, er * 0.15); ctx.closePath();
  ctx.stroke();
  // orbit ring
  ctx.strokeStyle = 'rgba(174,244,238,0.7)';
  ctx.lineWidth = Math.max(1, er * 0.08);
  ctx.beginPath();
  ctx.ellipse(0, 0, er * 1.5, er * 0.42, -0.35, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // wordmark: italic slab with chromatic split — reads as a designed logo
  ctx.transform(1, 0, -0.14, 1, 0, 0); // skew
  const fnt = '900 italic ' + size + 'px "Segoe UI", "Arial Black", system-ui, sans-serif';
  ctx.font = fnt;
  const skx = cx + ty * 0.14; // compensate skew so it stays centered
  const shimmer = 2.2 + Math.sin(t * 3) * 0.8;
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = COLORS[0].main; ctx.fillText('PRISMA', skx - shimmer, ty);
  ctx.fillStyle = COLORS[1].main; ctx.fillText('PRISMA', skx + shimmer, ty);
  ctx.globalAlpha = 1;
  ctx.shadowColor = 'rgba(20,10,50,0.9)'; ctx.shadowBlur = 0;
  ctx.shadowOffsetY = Math.max(2, size * 0.05);
  const wg = ctx.createLinearGradient(0, ty - size * 0.5, 0, ty + size * 0.45);
  wg.addColorStop(0, '#ffffff'); wg.addColorStop(0.55, '#eef0ff'); wg.addColorStop(1, '#a9b0e8');
  ctx.fillStyle = wg;
  ctx.fillText('PRISMA', skx, ty);
  ctx.shadowOffsetY = 0;

  // RUN badge under the wordmark
  const bw = size * 1.7, bh = size * 0.52;
  const by = ty + size * 0.62;
  ctx.font = '900 italic ' + (size * 0.42) + 'px "Segoe UI", "Arial Black", system-ui, sans-serif';
  const bx = skx + by * 0; // same skew space
  roundRectPath(bx - bw / 2, by - bh / 2, bw, bh, bh * 0.28);
  const bgrad = ctx.createLinearGradient(0, by - bh / 2, 0, by + bh / 2);
  bgrad.addColorStop(0, '#3ee6d8'); bgrad.addColorStop(1, '#1a9e93');
  ctx.fillStyle = bgrad;
  ctx.shadowColor = '#3ee6d8'; ctx.shadowBlur = 18;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#0b2b28';
  ctx.fillText('R U N', bx, by + 1);
  ctx.restore();

  text('ACROSS THE PRISM UNIVERSE', cx, ty + size * 1.18, Math.max(10, size * 0.17), 'rgba(255,255,255,0.5)', 'center', 600, 3);
}

function drawSkinTab(top, t) {
  const cols = W > 560 ? 5 : W > 340 ? 3 : 2;
  const cw = Math.min(150, (W - 32 - (cols - 1) * 10) / cols);
  const chH = cw * 1.25;

  for (let i = 0; i < SKINS.length; i++) {
    const s = SKINS[i];
    const col = i % cols, row = (i / cols) | 0;
    const x = x0 + col * (cw + 10), y = top + row * (chH + 12);
    const owned = save.skins.includes(s.id);
    const active = save.activeSkin === s.id;
    ctx.save();
    roundRectPath(x, y, cw, chH, 12);
    ctx.fillStyle = active ? 'rgba(62,230,216,0.12)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = active ? '#3ee6d8' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
    // preview: runner jogging in place
    ctx.save();
    ctx.translate(x + cw / 2, y + chH * 0.4);
    const c = COLORS[i % 3];
    ctx.shadowColor = c.main; ctx.shadowBlur = 16;
    drawRunner(cw * 0.15, c, t * 6 + i * 2, SKIN_ACCESSORY[s.id]);
    ctx.restore();
    text(s.name, x + cw / 2, y + chH * 0.66, Math.max(11, cw * 0.09), '#fff', 'center', 700);
    const label = active ? 'EQUIPPED' : owned ? 'EQUIP' : '◆ ' + fmt(s.price);
    const affordable = save.gems >= s.price;
    uiBtns.push({
      x, y, w: cw, h: chH, label: 'skin:' + s.id,
      cb: () => {
        if (active) return;
        if (owned) { save.activeSkin = s.id; persist(); sfxBuy(); }
        else if (affordable) {
          save.gems -= s.price; save.skins.push(s.id); save.activeSkin = s.id;
          persist(); sfxBuy(); toast(s.name + ' unlocked!', '#3ee6d8');
        } else { sfxDenied(); toast('Not enough shards', '#ff5e8a'); }
      }
    });
    text(label, x + cw / 2, y + chH * 0.85, Math.max(11, cw * 0.085),
      active ? '#3ee6d8' : owned ? '#fff' : affordable ? '#7ee8fa' : 'rgba(255,255,255,0.35)', 'center', 800);
  }
}

      roundRectPath(x0 + 16, y + 44, Math.max(12, bw2 * frac), 12, 6); ctx.fill();
    }
    text(fmt(Math.min(m.prog, m.target)) + ' / ' + fmt(m.target), x0 + 16, y + 72, 12, 'rgba(255,255,255,0.55)', 'left', 600);
    shardIcon(x0 + mw - 70, y + 71, 7);
    text('+' + m.reward, x0 + mw - 58, y + 72, 14, '#7ee8fa', 'left', 800);
  }
  text('Missions track across runs. Complete them for shards!', cx, 92 + save.missions.length * 104 + 16, 12, 'rgba(255,255,255,0.45)');
  drawToasts();
}

// ---------- render ----------
function drawDust(t) {
  // drifting motes tinted by the current world — cheap atmosphere
  const lc = pal.line.map(v => v | 0).join(',');
  for (let i = 0; i < 26; i++) {
    const spd = 8 + (i % 5) * 5;
    const x = ((i * 97.3) + t * spd) % (W + 20) - 10;
    const y = ((i * 53.7) % H + t * (10 + (i % 3) * 6)) % H;
    const a = (0.06 + 0.1 * Math.abs(Math.sin(t * 0.7 + i * 2.1)));
    ctx.fillStyle = 'rgba(' + lc + ',' + a + ')';
    ctx.fillRect(x, y, 1.5 + (i % 3), 1.5 + (i % 3));
  }
}
function drawSpeedLines(t) {
  const k = (game.speed - 0.8) / 0.5;
  if (k <= 0 || state !== 'playing') return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,' + (0.12 * Math.min(1, k)) + ')';
  ctx.lineWidth = 2;
  for (let i = 0; i < 7; i++) {
    const seed = ((i * 131 + ((t * 9) | 0) * 37) % 100) / 100;
    const ang = seed * Math.PI * 2;
    const r1 = Math.min(W, H) * 0.52, r2 = r1 + 60 + seed * 90;
    const cx = W / 2, cy = H * 0.45;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(ang) * r1, cy + Math.sin(ang) * r1);
    ctx.lineTo(cx + Math.cos(ang) * r2, cy + Math.sin(ang) * r2);
    ctx.stroke();
  }
  ctx.restore();
}
function render(t) {
  uiBtns = [];
  ctx.save();
  if (game.shake > 0) ctx.translate((Math.random() - 0.5) * game.shake, (Math.random() - 0.5) * game.shake);
  // camera lean into lane changes
  const lean = (game.lane - game.laneF) * 0.028;
  if (Math.abs(lean) > 0.001) {
    ctx.translate(W / 2, H); ctx.rotate(lean); ctx.translate(-W / 2, -H);
  }
  drawBackground(t);
  drawRoad();
  const ents = game.entities.concat(game.props).sort((a, b) => b.z - a.z);
  for (const e of ents) {
    if (e.z > 1 || e.z < -0.05) continue;
    if (e.type === 'prop') drawProp(e, t);
    else if (e.type === 'gate') drawGate(e, t);
    else if (e.type === 'obstacle') drawObstacle(e);
    else if (e.type === 'power') drawPower(e, t);
    else drawCrystal(e, t);
  }
  drawPlayer(t);
  drawParticles();
  drawDust(t);
  drawSpeedLines(t);
  ctx.restore();

  // permanent soft vignette
  const vg = ctx.createRadialGradient(W / 2, H * 0.45, Math.min(W, H) * 0.45, W / 2, H * 0.5, Math.max(W, H) * 0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(5,2,18,0.42)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  if (game.flashT > 0) {
    ctx.fillStyle = 'rgba(' + game.flashColor + ',' + (game.flashT * 0.45) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  if (state === 'menu') drawMenu(t);
  else if (state === 'shop') drawShop(t);
  else if (state === 'missions') drawMissions(t);
  else if (state === 'gameover') drawGameOver(t);
  else if (state === 'revive') { drawHUD(t); drawRevive(t); }
  else if (state === 'ad') drawAd(t);
  else if (state === 'countdown') { drawHUD(t); drawCountdown(); }
  else if (state === 'paused') { drawHUD(t); drawPaused(); }
  else drawHUD(t);
}

// ---------- daily reward ----------
(function daily() {
  const today = new Date().toISOString().slice(0, 10);
  if (save.lastDaily !== today) {
    save.lastDaily = today;
    save.gems += 80;
    persist();
    setTimeout(() => toast('DAILY REWARD  +80 ◆', '#ffb347'), 800);
  }
})();

// ---------- main loop ----------
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt, now / 1000);
  render(now / 1000);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// PWA: enables install-to-homescreen + offline play, and is the prerequisite
// for wrapping this as a Trusted Web Activity (TWA) Android app — see README.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
